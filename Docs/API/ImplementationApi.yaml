openapi: 3.0.3
info:
  title: RAKI API
  version: "1.0.0-impl"
servers:
  - url: https://api.raki.example.com/v1

paths:
  /api/login:
    post:
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ email, password ]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6..."
                  username:
                    type: string
                    example: "Evangelos Kampouris"
        '400':
          description: Validation Error (Invalid email format, empty fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized (Invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/dashboard:
    get:
      summary: Get user dashboard data
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
      responses:
        '200':
          description: Retrieved dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  employeeType:
                    type: string
                    nullable: true
                    example: "Owner"
                  businessType:
                    type: string
                    nullable: true
                    example: "Catering"
                  superAdmin:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reservations:
    get:
      summary: List reservations for a business
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    reservationId: { type: integer }
                    serviceName: { type: string }
                    employeeName: { type: string }
                    date: { type: string, format: date-time }
                    customerName: { type: string }
                    customerPhone: { type: string }
                    status: { type: string }
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reservations/{id}:
    put:
      summary: Update a reservation
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ businessId ]
              properties:
                businessId:
                  type: integer
                  format: int64
                  description: "The ID of the business owning this reservation"
                status:
                  type: string
                  enum: [ PENDING, CONFIRMED, COMPLETED, CANCELLED, NO_SHOW ]
                  description: "The new status of the reservation"
                customerName:
                  type: string
                  description: "Updated customer name"
                customerPhone:
                  type: string
                  description: "Updated customer phone number"
      responses:
        '200':
          description: Updated successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Updated successfully"
        '400':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a reservation
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Deleted successfully
          content:
            text/plain:
              schema:
                type: string
                example: "Deleted successfully"
        '404':
          description: Reservation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reservations/new:
    get:
      summary: Get data for creating a new reservation
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Data for creating a new reservation
          content:
            application/json:
              schema:
                type: object
                properties:
                  services:
                    type: array
                    items:
                      type: object
                      properties:
                        serviceId: { type: integer }
                        name: { type: string }
                        durationMinutes: { type: integer }
                        price: { type: number, format: double }
                  employees:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a new reservation
      parameters:
        - in: header
          name: Authorization
          required: true
          schema:
            type: string
            example: "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6..."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ businessId, serviceId, employeeId, date, customerName, customerContact ]
              properties:
                businessId: { type: integer, format: int64 }
                serviceId: { type: integer }
                employeeId: { type: integer, description: "Null or 0 can represent 'Any Available'" }
                date: { type: string, format: date, example: "2023-11-01 10:30:00" }
                customerName: { type: string, example: "Alice Johnson" }
                customerContact: { type: string, example: "alice.johnson@example.com" }
      responses:
        '201':
          description: Reservation created successfully
          content:
            application/json:
              schema:
                type: string
                example: "Reservation created successfully for Alice Johnson with EmployeeName"
        '400':
          description: Validation Error (Missing or invalid fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/reservations/availability:
    get:
      summary: Get timeslots for a specific service, employee and date
      parameters:
        - in: header
          name: Authorization
          required: true
          schema: { type: string }
        - name: businessId
          in: query
          required: true
          schema: { type: integer, format: int64 }
        - name: employeeId
          in: query
          required: true
          description: "ID of staff. If 0, checks 'Any Available' logic."
          schema: { type: integer }
        - name: date
          in: query
          required: true
          schema: { type: string, format: date, example: "2023-11-01" }
      responses:
        '200':
          description: List of valid start times (Simple List Strategy)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                  example: "9:30"
                  description: "Start time string"

        '400':
          description: Validation Error (Missing or invalid query parameters)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '401':
          description: Unauthorized (Missing or invalid token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal Server Error (Database or System failure)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  # =========================
  # Products
  # =========================
  /api/products:
    get:
      summary: List products for a business
      parameters:
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
        '400':
          description: Validation error (missing businessId)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSaveRequest'
      responses:
        '201':
          description: Created product ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 101
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/products/{id}:
    get:
      summary: Get product by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Update product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSaveRequest'
      responses:
        '200':
          description: Updated product ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete product
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            format: int64
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Product deleted
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Product not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================
  # Taxes & Product Types (simple lists)
  # =========================
  /api/taxes:
    get:
      summary: List tax categories
      responses:
        '200':
          description: List of tax categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaxCategory'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/product-types:
    get:
      summary: List product types
      responses:
        '200':
          description: List of product types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductType'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================
  # Ingredient Categories & Ingredients
  # =========================
  /api/menu/ingredient-categories:
    get:
      summary: List ingredient categories for a business
      parameters:
        - in: query
          name: businessId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of ingredient categories with stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IngredientCategorySummary'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Create ingredient category and its ingredients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientCategorySaveRequest'
      responses:
        '201':
          description: Created category ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/menu/ingredient-categories/{categoryId}:
    put:
      summary: Update ingredient category and its ingredients
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngredientCategorySaveRequest'
      responses:
        '200':
          description: Updated category ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Delete ingredient category
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Category deleted
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/menu/ingredient-categories/{categoryId}/ingredients:
    get:
      summary: List ingredients for a category
      parameters:
        - in: path
          name: categoryId
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: List of ingredients
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ingredient'
        '404':
          description: Category not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================
  # Orders
  # =========================
  /api/orders:
    post:
      summary: Create order with items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '201':
          description: Created order ID
          content:
            application/json:
              schema:
                type: integer
                format: int64
                example: 5001
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# -------------------------------------------------------------------
# Reusable Schemas
# -------------------------------------------------------------------
components:
  schemas:
    # Schema for 400 Bad Request (Field Validation)
    ValidationError:
      type: object
      additionalProperties:
        type: string
      example:
        email: "must be a valid email"
        password: "must not be empty"

    # Schema for 401 Unauthorized AND 500 Internal Server Error
    # Reused because both return a simple { "error": "message" } object
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      example:
        error: "Internal Error."

    # =========================
    # Domain Schemas
    # =========================
    Product:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true
        taxCategory:
          type: integer
          format: int64
          nullable: true
        productType:
          type: integer
          format: int64
          nullable: true
        productTypeName:
          type: string
          nullable: true
        businessId:
          type: integer
          format: int64
        basePrice:
          type: number
          format: double
        type:
          type: string
          example: PRODUCT
        status:
          type: string
          example: ACTIVE
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ProductSaveRequest:
      type: object
      required: [name, businessId, basePrice, type, status]
      properties:
        productId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        taxCategory:
          type: integer
          format: int64
          nullable: true
        productType:
          type: integer
          format: int64
          nullable: true
        businessId:
          type: integer
          format: int64
        basePrice:
          type: number
          format: double
        type:
          type: string
          example: PRODUCT
        status:
          type: string
          example: ACTIVE
        ingredientIds:
          type: array
          items:
            type: integer
            format: int64

    TaxCategory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    ProductType:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string

    IngredientCategorySummary:
      type: object
      properties:
        categoryId:
          type: integer
          format: int64
        businessId:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true
        ingredientsCount:
          type: integer
          format: int32
        productsCount:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    IngredientCategorySaveRequest:
      type: object
      required: [businessId, name]
      properties:
        categoryId:
          type: integer
          format: int64
          nullable: true
        businessId:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
          nullable: true
        ingredients:
          type: array
          items:
            $ref: '#/components/schemas/IngredientSave'

    IngredientSave:
      type: object
      properties:
        ingredientId:
          type: integer
          format: int64
          nullable: true
        name:
          type: string
        price:
          type: number
          format: double
          example: 0.5

    Ingredient:
      type: object
      properties:
        ingredientId:
          type: integer
          format: int64
        name:
          type: string
        price:
          type: number
          format: double

    CreateOrderRequest:
      type: object
      required: [businessId, userId, items]
      properties:
        orderNumber:
          type: string
          nullable: true
          description: If null/blank, server generates ORD-*
        businessId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        specialRequests:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItemRequest'

    OrderItemRequest:
      type: object
      required: [productId, quantity]
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1