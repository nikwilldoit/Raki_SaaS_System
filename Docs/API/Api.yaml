openapi: 3.0.3
info:
  title: RAKI API 
  version: "1.0.0-impl"
servers:
  - url: https://api.raki.example.com/v1
tags:
  - name: Auth
  - name: Merchants
  - name: Branches
  - name: Employees
  - name: Roles
  - name: Permissions
  - name: Products
  - name: ProductTypes
  - name: IngredientCategories
  - name: Ingredients
  - name: Catalogue
  - name: Orders
  - name: OrderItems
  - name: Payments
  - name: PaymentSplits
  - name: Refunds
  - name: Discounts
  - name: Taxes
  - name: Services
  - name: Schedules
  - name: Reservations
  - name: Deposits
  - name: CancellationFees
  - name: Webhooks
security:
  - bearerAuth: []
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email/password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: Tokens
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }

  /merchants:
    post:
      tags: [Merchants]
      summary: Create merchant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MerchantCreate' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Merchant' }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Merchants]
      summary: Get merchant
      responses:
        '200': { description: Merchant, content: { application/json: { schema: { $ref: '#/components/schemas/Merchant' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Merchants]
      summary: Update merchant
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MerchantUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Merchant' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Merchants]
      summary: Delete merchant
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/branches:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Branches]
      summary: List branches
      responses:
        '200':
          description: Branches
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Branch' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [Branches]
      summary: Create branch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BranchCreate' }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Branch' } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/branches/{branchId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/BranchId' } ]
    get:
      tags: [Branches]
      summary: Get branch
      responses:
        '200': { description: Branch, content: { application/json: { schema: { $ref: '#/components/schemas/Branch' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Branches]
      summary: Update branch
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BranchUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Branch' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Branches]
      summary: Delete branch
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/employees:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Employees]
      summary: List employees
      responses:
        '200':
          description: Employees
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Employee' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [Employees]
      summary: Create employee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/employees/{userId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/UserId' } ]
    get:
      tags: [Employees]
      summary: Get employee
      responses:
        '200': { description: Employee, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Employees]
      summary: Update employee
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Employees]
      summary: Delete employee
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/employees/{userId}/roles:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/UserId' } ]
    get:
      tags: [Employees]
      summary: List employee role
      responses:
        '200': { description: Role, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Role' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Employees]
      summary: Assign role to employee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleId]
              properties:
                roleId: { type: integer, format: int64 }
      responses:
        '204': { description: Role assigned }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /roles:
    get:
      tags: [Roles]
      summary: List roles
      responses:
        '200': { description: Roles, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Role' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
  
  /roles/{roleId}/permissions:
    parameters: [ { $ref: '#/components/parameters/RoleId' } ]
    get:
      tags: [Roles]
      summary: List role permissions
      responses:
        '200': { description: Permissions, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Permission' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /permissions:
    get:
      tags: [Permissions]
      summary: List permissions
      responses:
        '200': { description: Permissions, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Permission' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }

  /merchants/{merchantId}/product-types:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [ProductTypes]
      summary: List product types
      responses:
        '200': { description: Types, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ProductType' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [ProductTypes]
      summary: Create product type
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductTypeCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/ProductType' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/product-types/{typeId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/TypeId' } ]
    get:
      tags: [ProductTypes]
      summary: Get product type
      responses:
        '200': { description: Type, content: { application/json: { schema: { $ref: '#/components/schemas/ProductType' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [ProductTypes]
      summary: Update product type
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductTypeUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/ProductType' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [ProductTypes]
      summary: Delete product type
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/products:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Products]
      summary: List products
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [active, inactive, out_of_stock] }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: Products
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Product' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [Products]
      summary: Create product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/products/{productId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/ProductId' } ]
    get:
      tags: [Products]
      summary: Get product
      responses:
        '200': { description: Product, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Products]
      summary: Update product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/Product' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Products]
      summary: Delete product
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/ingredient-categories:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [IngredientCategories]
      summary: List ingredient categories
      parameters:
        - in: query
          name: productId
          schema: { type: integer, format: int64 }
      responses:
        '200':
          description: Categories
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/IngredientCategory' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [IngredientCategories]
      summary: Create ingredient category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngredientCategoryCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/IngredientCategory' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/ingredient-categories/{categoryId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/CategoryId' } ]
    get:
      tags: [IngredientCategories]
      summary: Get ingredient category
      responses:
        '200': { description: Category, content: { application/json: { schema: { $ref: '#/components/schemas/IngredientCategory' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [IngredientCategories]
      summary: Update ingredient category
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngredientCategoryUpdate' }
      responses:
        '200': { description: Updated, content: { application/json: { schema: { $ref: '#/components/schemas/IngredientCategory' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/ingredient-categories/{categoryId}/ingredients:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/CategoryId' } ]
    get:
      tags: [Ingredients]
      summary: List ingredients in category
      responses:
        '200': { description: Ingredients, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Ingredient' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    post:
      tags: [Ingredients]
      summary: Create ingredient
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/IngredientCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Ingredient' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  #Products addition are performed through product endpoints
  /merchants/{merchantId}/catalogue:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Catalogue]
      summary: List catalogue entries (stock/status per product)
      responses:
        '200':
          description: Catalogue
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/CatalogueItem' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [Catalogue]
      summary: Upsert catalogue entry
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CatalogueItemUpsert' }
      responses:
        '200': { description: Upserted, content: { application/json: { schema: { $ref: '#/components/schemas/CatalogueItem' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/orders:
    parameters: [ { $ref: '#/components/parameters/MerchantId' } ]
    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [open, closed, cancelled, refunded] }
      responses:
        '200': { description: Orders, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Order' } } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
    post:
      tags: [Orders]
      summary: Create order (open)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCreate' }
      responses:
        '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Order' } } } }
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /merchants/{merchantId}/orders/{orderId}:
    parameters: [ { $ref: '#/components/parameters/MerchantId' }, { $ref: '#/components/parameters/OrderId' } ]
    get:
      tags: [Orders]
      summary: Get order with computed totals
      responses:
        '200': { description: Order, content: { application/json: { schema: { $ref: '#/components/schemas/Order' } } } }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
    patch:
      tags: [Orders]
      summary: Update order (open only) — add/remove items, set discount, requests
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderUpdate' }
      responses:
