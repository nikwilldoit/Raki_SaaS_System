        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '409': { $ref: '#/components/responses/ConflictError' }

  /merchants/{merchantId}/reservations/{reservationId}/deposits:
    parameters:
      - { $ref: '#/components/parameters/MerchantId' }
      - { $ref: '#/components/parameters/ReservationId' }

    post:
      tags: [Deposits]
      summary: Record reservation deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReservationDepositCreate'
      responses:
        '201':
          description: Deposit recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDeposit'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

    get:
      tags: [Deposits]
      summary: Get all deposits for a reservation
      responses:
        '200':
          description: List of reservation deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReservationDeposit'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /merchants/{merchantId}/reservations/{reservationId}/deposits/{depositId}:
    parameters:
      - { $ref: '#/components/parameters/MerchantId' }
      - { $ref: '#/components/parameters/ReservationId' }
      - in: path
        name: depositId
        required: true
        schema:
          type: integer
          format: int64
        description: The ID of the reservation deposit

    patch:
      tags: [Deposits]
      summary: Update a reservation deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  multipleOf: 0.01
                payment_method:
                  type: string
      responses:
        '200':
          description: Deposit updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReservationDeposit'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      tags: [Deposits]
      summary: Delete a reservation deposit
      responses:
        '204': { description: Deposit deleted successfully }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }


  /merchants/{merchantId}/reservations/{reservationId}/cancellation-fees:
    parameters:
      - { $ref: '#/components/parameters/MerchantId' }
      - { $ref: '#/components/parameters/ReservationId' }

    post:
      tags: [CancellationFees]
      summary: Apply cancellation fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancellationFeeCreate'
      responses:
        '201':
          description: Fee recorded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationFee'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

    get:
      tags: [CancellationFees]
      summary: Get all cancellation fees for a reservation
      responses:
        '200':
          description: List of cancellation fees
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CancellationFee'
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }

  /merchants/{merchantId}/reservations/{reservationId}/cancellation-fees/{feeId}:
    parameters:
      - { $ref: '#/components/parameters/MerchantId' }
      - { $ref: '#/components/parameters/ReservationId' }
      - in: path
        name: feeId
        required: true
        schema:
          type: integer
          format: int64
        description: The ID of the cancellation fee

    patch:
      tags: [CancellationFees]
      summary: Update a cancellation fee
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                  multipleOf: 0.01
                reason:
                  type: string
      responses:
        '200':
          description: Cancellation fee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancellationFee'
        '400': { $ref: '#/components/responses/BadRequestError' }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }
        '422': { $ref: '#/components/responses/ValidationError' }

    delete:
      tags: [CancellationFees]
      summary: Delete a cancellation fee
      responses:
        '204': { description: Cancellation fee deleted successfully }
        '401': { $ref: '#/components/responses/UnauthorizedError' }
        '403': { $ref: '#/components/responses/ForbiddenError' }
        '404': { $ref: '#/components/responses/NotFoundError' }


  /webhooks/stripe:
    post:
      tags: [Webhooks]
      summary: Stripe webhook (payments/refunds events)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        '200': { description: OK }
        '400': { $ref: '#/components/responses/BadRequestError' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    MerchantId: { name: merchantId, in: path, required: true, schema: { type: integer, format: int64 } }
    BranchId: { name: branchId, in: path, required: true, schema: { type: integer, format: int64 } }
    UserId: { name: userId, in: path, required: true, schema: { type: integer, format: int64 } }
    RoleId: { name: roleId, in: path, required: true, schema: { type: integer, format: int64 } }
    ProductId: { name: productId, in: path, required: true, schema: { type: integer, format: int64 } }
    CategoryId: { name: categoryId, in: path, required: true, schema: { type: integer, format: int64 } }
    IngredientId: { name: ingredientId, in: path, required: true, schema: { type: integer, format: int64 } }
    OrderId: { name: orderId, in: path, required: true, schema: { type: integer, format: int64 } }
    PaymentId: { name: paymentId, in: path, required: true, schema: { type: integer, format: int64 } }
    TaxRateId: { name: taxrateId, in: path, required: true, schema: { type: integer, format: int64 } }
    ReservationId: { name: reservationId, in: path, required: true, schema: { type: integer, format: int64 } }
    ServiceId: { name: serviceId, in: path, required: true, schema: { type: integer, format: int64 } }
    ScheduleId: { name: scheduleId, in: path, required: true, schema: { type: integer, format: int64 } }
    TypeId: { name: typeId, in: path, required: true, schema: { type: integer, format: int64 } }
    DiscountId: { name: discountId, in: path, required: true, schema: { type: integer, format: int64 } }

  responses:
    UnauthorizedError:
      description: Unauthenticated (missing/invalid/expired token)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            unauthenticated:
              value: { code: unauthenticated, message: "Missing or invalid access token." }
    ForbiddenError:
      description: Forbidden (valid token, but not allowed by role/tenant)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            forbidden:
              value: { code: forbidden, message: "You do not have permission to perform this action." }
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            not_found:
              value: { code: not_found, message: "Resource not found." }
    BadRequestError:
      description: Bad request (malformed JSON or unsupported value)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            bad_request:
              value: { code: bad_request, message: "Malformed request body." }
    ValidationError:
      description: Validation error (field-level errors)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            validation_error:
              value:
                code: validation_error
                message: "One or more fields are invalid."
                fieldErrors:
                  - field: email
                    message: Email is already in use.
                    code: unique_violation
    ConflictError:
      description: Conflict (concurrency or business rule)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
          examples:
            conflict:
              value: { code: conflict, message: "Conflict with current resource state." }

  schemas:
    # Auth
    AuthTokens:
      type: object
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
      required: [accessToken, refreshToken]

    # Generic error schema
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Machine-readable code
          enum: [unauthenticated, forbidden, not_found, bad_request, validation_error, conflict, rate_limited, internal]
        message:
          type: string
          description: Human-readable summary
        requestId:
          type: string
          description: Trace id for debugging
        details:
          type: object
          additionalProperties: true
        fieldErrors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field: { type: string }
              message: { type: string }
              code: { type: string }

    # Merchant/Branch
    MerchantCreate:
      type: object
      required: [business_name, business_type, phone, email]
      properties:
        business_name: { type: string }
        business_type: { type: string, enum: [restaurant, bar, cafe, barber, hairdresser, spa, beauty_salon] }
        AddressLine1: { type: string }
        City: { type: string }
        Region: { type: string }
        PostalCode: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
    MerchantUpdate:
      allOf: [ { $ref: '#/components/schemas/MerchantCreate' } ]
    Merchant:
      allOf:
        - $ref: '#/components/schemas/MerchantCreate'
        - type: object
          properties:
            merchant_id: { type: integer, format: int64 }
            status: { type: string, enum: [active, inactive, suspended], default: active }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    BranchCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        AddressLine1: { type: string }
        City: { type: string }
        Region: { type: string }
        PostalCode: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        status: { type: string, enum: [active, inactive], default: active }
    BranchUpdate:
      allOf: [ { $ref: '#/components/schemas/BranchCreate' } ]
    Branch:
      allOf:
        - $ref: '#/components/schemas/BranchCreate'
        - type: object
          properties:
            branch_id: { type: integer, format: int64 }
            merchant_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    # RBAC
    RoleCreate:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }
    Role:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Permission:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        resource: { type: string }
        action: { type: string }
        description: { type: string }

    EmployeeCreate:
      type: object
      required: [email, password, first_name, last_name, role_id]
      properties:
        email: { type: string, format: email }
        password: { type: string }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        role_id: { type: integer }
    EmployeeUpdate:
      type: object
      properties:
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        role_id: { type: integer }
        status: { type: string, enum: [active, suspended, fired] }
    Employee:
      type: object
      properties:
        user_id: { type: integer, format: int64 }
        merchant_id: { type: integer, format: int64 }
        role_id: { type: integer }
        email: { type: string, format: email }
        password: { type: string, format: password }
        first_name: { type: string }
        last_name: { type: string }
        phone: { type: string }
        status: { type: string, enum: [active, suspended, fired], default: active }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    # Product Types / Products / Ingredients / Catalogue
    ProductTypeCreate:
      type: object
      required: [product_name]
      properties:
        product_name: { type: string }
    ProductTypeUpdate:
      type: object
      properties:
        product_name: { type: string }
    ProductType:
      type: object
      properties:
        product_type_id: { type: integer, format: int64 }
        product_name: { type: string }

    ProductCreate:
      type: object
      required: [name, tax_category, product_type, merchant_id, base_price, type]
      properties:
        name: { type: string }
        description: { type: string }
        tax_category: { type: integer, format: int64 }
        product_type: { type: integer, format: int64 }
        merchant_id: { type: integer, format: int64 }
        base_price: { type: number, multipleOf: 0.01 }
        type: { type: string, enum: [product, service] }
        status: { type: string, enum: [active, inactive, out_of_stock], default: active }
    ProductUpdate:
      allOf: [ { $ref: '#/components/schemas/ProductCreate' } ]
    Product:
      allOf:
        - $ref: '#/components/schemas/ProductCreate'
        - type: object
          properties:
            product_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    IngredientCategoryCreate:
      type: object
      required: [product_id, merchant_id, name]
      properties:
        product_id: { type: integer, format: int64 }
        merchant_id: { type: integer, format: int64 }
        name: { type: string }
        description: { type: string }
    IngredientCategoryUpdate:
      allOf: [ { $ref: '#/components/schemas/IngredientCategoryCreate' } ]
    IngredientCategory:
      allOf:
        - $ref: '#/components/schemas/IngredientCategoryCreate'
        - type: object
          properties:
            category_id: { type: integer, format: int64 }

    IngredientCreate:
      type: object
      required: [ingredient_category_id, name, price]
      properties:
        ingredient_category_id: { type: integer, format: int64 }
        name: { type: string }
        price: { type: number, multipleOf: 0.01 }
    Ingredient:
      allOf:
        - $ref: '#/components/schemas/IngredientCreate'
        - type: object
          properties:
            ingredient_id: { type: integer, format: int64 }

    CatalogueItemUpsert:
      type: object
      required: [product_id, status]
      properties:
        product_id: { type: integer, format: int64 }
        status: { type: string, enum: [active, inactive, out_of_stock] }
        stock_quantity: { type: integer, minimum: 0 }
    CatalogueItem:
      allOf:
        - $ref: '#/components/schemas/CatalogueItemUpsert'
        - type: object
          properties:
            catalogue_id: { type: integer, format: int64 }
            merchant_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    # Orders & Items
    OrderCreate:
      type: object
      required: [employee_id]
      properties:
        employee_id: { type: integer, format: int64 }
        discount_id: { type: integer, format: int64, nullable: true }
        special_requests: { type: string }
    OrderUpdate:
      type: object
      properties:
        discount_id: { type: integer, format: int64, nullable: true }
        special_requests: { type: string }
        status: { type: string, enum: [open, closed, cancelled, refunded] }
    Order:
      type: object
      properties:
        order_id: { type: integer, format: int64 }
        merchant_id: { type: integer, format: int64 }
        employee_id: { type: integer, format: int64 }
        order_number: { type: string }
        order_date: { type: string, format: date-time }
        order_status: { type: string, enum: [open, closed, cancelled, refunded] }
        discount_id: { type: integer, format: int64, nullable: true }
        special_requests: { type: string }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }
        totals:
          type: object
          description: Computed on-the-fly from products + ingredients + discounts + taxes
          properties:
            subtotal: { type: number, multipleOf: 0.01 }
            discount_total: { type: number, multipleOf: 0.01 }
            tax_total: { type: number, multipleOf: 0.01 }
            grand_total: { type: number, multipleOf: 0.01 }
            paid_total: { type: number, multipleOf: 0.01 }
            amount_due: { type: number, multipleOf: 0.01 }
    OrderItemCreate:
      type: object
      required: [product_id, quantity]
      properties:
        product_id: { type: integer, format: int64 }
        quantity: { type: integer, minimum: 1 }
        ingredient_ids:
          type: array
          items: { type: integer, format: int64 }
    OrderItem:
      type: object
      properties:
        order_item_id: { type: integer, format: int64 }
        order_id: { type: integer, format: int64 }
        product_id: { type: integer, format: int64 }
        quantity: { type: integer }
        payment_status: { type: string, enum: [Unpaid, Paid] }

    # Payments / Splits / Refunds
    PaymentCreate:
      type: object
      required: [payment_method, amount]
      properties:
        payment_method: { type: string, enum: [cash, card, gift_card] }
        amount: { type: number, multipleOf: 0.01 }
        tip_amount: { type: number, multipleOf: 0.01, default: 0.00 }
        split: { type: boolean, default: false }
        stripe_payment_intent_id: { type: string, description: Required for card when integrating Stripe }
    Payment:
      type: object
      properties:
        payment_id: { type: integer, format: int64 }
        order_id: { type: integer, format: int64, nullable: true }
        merchant_id: { type: integer, format: int64 }
        payment_method: { type: string, enum: [cash, card, gift_card] }
        split: { type: boolean }
        status: { type: string, enum: [pending, processing, completed, failed, cancelled, refunded] }
        tip_amount: { type: number, multipleOf: 0.01 }
        amount: { type: number, multipleOf: 0.01 }
        created_at: { type: string, format: date-time }
        processed_at: { type: string, format: date-time, nullable: true }

    PaymentSplitCreate:
      type: object
      required: [customer_name, amount, payment_method]
      properties:
        customer_name: { type: string }
        amount: { type: number, multipleOf: 0.01 }
        tip_amount: { type: number, multipleOf: 0.01, default: 0.00 }
        payment_method: { type: string, enum: [cash, card, gift_card] }
        items:
          type: array
          items:
            type: object
            required: [order_item_id, amount]
            properties:
              order_item_id: { type: integer, format: int64 }
              amount: { type: number, multipleOf: 0.01 }
    PaymentSplit:
      type: object
      properties:
        split_id: { type: integer, format: int64 }
        payment_id: { type: integer, format: int64 }
        customer_name: { type: string }
        amount: { type: number, multipleOf: 0.01 }
        tip_amount: { type: number, multipleOf: 0.01 }
        payment_method: { type: string, enum: [cash, card, gift_card] }
        status: { type: string, enum: [pending, completed, failed] }
        created_at: { type: string, format: date-time }
        items:
          type: array
          items:
            type: object
            properties:
              split_item_id: { type: integer, format: int64 }
              order_item_id: { type: integer, format: int64 }
              amount: { type: number, multipleOf: 0.01 }

    RefundCreate:
      type: object
      required: [amount, refund_type]
      properties:
        amount: { type: number, multipleOf: 0.01 }
        reason: { type: string }
        refund_type: { type: string, enum: [full, partial] }
        payment_id: { type: integer, format: int64, nullable: true }
    Refund:
      type: object
      properties:
        refund_id: { type: integer, format: int64 }
        order_id: { type: integer, format: int64 }
        payment_id: { type: integer, format: int64, nullable: true }
        merchant_id: { type: integer, format: int64 }
        amount: { type: number, multipleOf: 0.01 }
        reason: { type: string }
        refund_type: { type: string, enum: [full, partial] }
        status: { type: string, enum: [pending, approved, processed, rejected] }
        processed_by: { type: integer, format: int64, nullable: true }
        approved_by: { type: integer, format: int64, nullable: true }
        transaction_reference: { type: string }
        created_at: { type: string, format: date-time }
        processed_at: { type: string, format: date-time, nullable: true }

    # Discounts & Taxes
    DiscountCreate:
      type: object
      required: [name, type, value_type, value, start_time]
      properties:
        name: { type: string }
        type: { type: string, enum: [order_discount, product_discount] }
        value_type: { type: string, enum: [value, percentage] }
        value: { type: number }
        minimum_order_value: { type: number, multipleOf: 0.01, default: 0.00 }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [active, inactive, expired], default: inactive }
        max_uses: { type: integer, nullable: true }
    DiscountUpdate:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [order_discount, product_discount] }
        value_type: { type: string, enum: [value, percentage] }
        value: { type: number }
        minimum_order_value: { type: number, multipleOf: 0.01 }
        start_time: { type: string, format: date-time }
        end_time: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [active, inactive, expired] }
        max_uses: { type: integer, nullable: true }
    Discount:
      allOf:
        - $ref: '#/components/schemas/DiscountCreate'
        - type: object
          properties:
            discount_id: { type: integer, format: int64 }
            current_uses: { type: integer }
            merchant_id: { type: integer, format: int64 }

    TaxRateCreate:
      type: object
      required: [name, rate]
      properties:
        name: { type: string }
        rate: { type: number,  multipleOf: 0.01 }
        description: { type: string }
        status: { type: string, enum: [active, inactive, pending], default: pending }
    TaxRate:
      allOf:
        - $ref: '#/components/schemas/TaxRateCreate'
        - type: object
          properties:
            taxrate_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    # Services / Schedules / Reservations
    ServiceCreateInMerchant:
      type: object
      required: [name, duration, price]
      properties:
        name: { type: string }
        description: { type: string }
        duration: { type: integer, description: "minutes" }
        price: { type: number, multipleOf: 0.01 }
        subcategory: { type: string }
        # status optional (or omit completely and default server-side)
        status: { type: string, enum: [active, inactive], default: active }
    Service:
      allOf:
        - $ref: '#/components/schemas/ServiceCreateInMerchant'
        - type: object
          properties:
            service_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    ScheduleCreate:
      type: object
      required: [user_id, date, start_time, end_time]
      properties:
        user_id: { type: integer, format: int64 }
        date: { type: string, format: date }
        start_time: { type: string, pattern: '^\d{2}:\d{2}(:\d{2})?$' }
        end_time: { type: string, pattern: '^\d{2}:\d{2}(:\d{2})?$' }
        is_available: { type: boolean, default: true }
        status: { type: string, enum: [active, cancelled, modified], default: active }
    Schedule:
      allOf:
        - $ref: '#/components/schemas/ScheduleCreate'
        - type: object
          properties:
            schedule_id: { type: integer, format: int64 }
            merchant_id: { type: integer, format: int64 }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    ReservationCreate:
      type: object
      required: [customer_id, reservation_date, start_time, end_time]
      properties:
        customer_id: { type: integer, format: int64 }
        service_id: { type: integer, format: int64, nullable: true }
        assigned_user_id: { type: integer, format: int64, nullable: true }
        reservation_date: { type: string, format: date }
        start_time: { type: string, pattern: '^\d{2}:\d{2}(:\d{2})?$' }
        end_time: { type: string, pattern: '^\d{2}:\d{2}(:\d{2})?$' }
        deposit_amount: { type: number, multipleOf: 0.01, default: 0.00 }
        total_amount: { type: number, multipleOf: 0.01, default: 0.00 }
    ReservationUpdate:
      type: object
      properties:
        service_id: { type: integer, format: int64, nullable: true }
        assigned_user_id: { type: integer, format: int64, nullable: true }
        reservation_date: { type: string, format: date }
        start_time: { type: string }
        end_time: { type: string }
        status: { type: string, enum: [pending, confirmed, in_progress, completed, cancelled, no_show] }
    Reservation:
      allOf:
        - $ref: '#/components/schemas/ReservationCreate'
        - type: object
          properties:
            reservation_id: { type: integer, format: int64 }
            merchant_id: { type: integer, format: int64 }
            status: { type: string, enum: [pending, confirmed, in_progress, completed, cancelled, no_show] }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }

    ReservationDepositCreate:
      type: object
      required: [amount, payment_method]
      properties:
        amount: { type: number, multipleOf: 0.01 }
        payment_method: { type: string, enum: [cash, card, mobile_payment, bank_transfer] }
        transaction_reference: { type: string }
    ReservationDeposit:
      allOf:
        - $ref: '#/components/schemas/ReservationDepositCreate'
        - type: object
          properties:
            deposit_id: { type: integer, format: int64 }
            reservation_id: { type: integer, format: int64 }
            status: { type: string, enum: [pending, completed, refunded], default: pending }
            created_at: { type: string, format: date-time }

    CancellationFeeCreate:
      type: object
      required: [amount]
      properties:
        amount: { type: number, multipleOf: 0.01 }
        waived: { type: boolean, default: false }
        waived_by: { type: integer, format: int64, nullable: true }
    CancellationFee:
      allOf:
        - $ref: '#/components/schemas/CancellationFeeCreate'
        - type: object
          properties:
            fee_id: { type: integer, format: int64 }
            reservation_id: { type: integer, format: int64 }
            applied_at: { type: string, format: date-time }
